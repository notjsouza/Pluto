version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 20
        - npm ci --cache .npm --prefer-offline --no-audit
        - |
          # ── JDK 21 setup ──────────────────────────────────────────────
          if java -version 2>&1 | grep -q 'version "21'; then
            echo "JDK 21 already active"
          elif [ -d "/usr/lib/jvm/java-21-amazon-corretto" ]; then
            export JAVA_HOME=/usr/lib/jvm/java-21-amazon-corretto
          else
            yum install -y java-21-amazon-corretto-headless java-21-amazon-corretto-devel
            export JAVA_HOME=/usr/lib/jvm/java-21-amazon-corretto
          fi
          export PATH=$JAVA_HOME/bin:$PATH
          java -version

          # ── Maven setup ───────────────────────────────────────────────
          if ! command -v mvn &>/dev/null; then
            echo "Maven not found – installing..."
            MVN_VERSION=3.9.9
            curl -fsSL "https://archive.apache.org/dist/maven/maven-3/${MVN_VERSION}/binaries/apache-maven-${MVN_VERSION}-bin.tar.gz" \
              | tar -xz -C /opt
            export PATH=/opt/apache-maven-${MVN_VERSION}/bin:$PATH
          fi
          mvn -version

          # ── Build Java Lambda fat JARs ────────────────────────────────
          mvn -f amplify/functions/pom.xml clean package -DskipTests -q
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --outputs-version 1.1 --outputs-format json
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npm ci --cache .npm --prefer-offline --no-audit
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/.cache/npm
      - .next/cache/**/*
