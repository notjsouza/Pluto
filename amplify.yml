version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 20
        - npm ci --cache .npm --prefer-offline --no-audit
        - |
          # Ensure JDK 21 is available for the Maven build
          if java -version 2>&1 | grep -q 'version "21'; then
            echo "JDK 21 already active"
          elif [ -d "/usr/lib/jvm/java-21-amazon-corretto" ]; then
            export JAVA_HOME=/usr/lib/jvm/java-21-amazon-corretto
            export PATH=$JAVA_HOME/bin:$PATH
          else
            yum install -y java-21-amazon-corretto-headless java-21-amazon-corretto-devel
            export JAVA_HOME=/usr/lib/jvm/java-21-amazon-corretto
            export PATH=$JAVA_HOME/bin:$PATH
          fi
          java -version
        - cd amplify/functions && mvn clean package -DskipTests -q && cd ../..
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --outputs-version 1.1 --outputs-format json
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20
        - npm ci --cache .npm --prefer-offline --no-audit
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/.cache/npm
      - .next/cache/**/*
